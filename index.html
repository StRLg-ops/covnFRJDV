<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strona z menu</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            width: 320px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
        }
        
        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
            text-align: center;
        }
        
        input, select {
            width: 100%;
            padding: 8px;
            margin: 0 auto;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            text-align: center;
        }
        
        input[type="checkbox"] {
            width: auto;
            display: inline-block;
            margin-left: 10px;
        }
        
        .checkbox-label {
            display: inline-block;
            margin-top: 15px;
        }
        
        .buttons {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .buttons:hover {
            background-color: #45a049;
        }
        
        #arrivalTime {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 4px;
        }
        
        .dodi {
            text-align: center;
        }
    </style>
</head>
<body>
    
    <div class="container">
        <h1>Kalkulator czasu</h1>
    
        <label for="distance">Vzdálenost (km):</label>
        <input type="text" id="distance" class="dodi">
        
        <label for="speed">Rychlost jednotky (km):</label>
        <input type="text" id="speed" class="dodi">
    
        <label for="mapSpeed">Prędkość karty:</label>
        <input type="text" id="mapSpeed" value="1" class="dodi">
    
        <label for="faction">Wybierz województwo</label>
        <select id="faction">
            <option value="1">Własną Prowincja</option>
            <option value="0.7">Przyjazna Prowincja</option>
            <option value="0.35">Prowincja wroga</option>
        </select>
    
        <label for="march">Marsz włączony?</label>
        <input type="checkbox" id="march">
        <br>
    
        <input type="button" class="buttons" value="Pokaż wynik" onclick="calculateArrivalTime()">
    
        <p id="arrivalTime"></p>
    </div>

    <script>
        function addLeadingZero(number) {
            return number < 10 ? "0" + number : number;
        }

        function calculateArrivalTime() {
            var distance = parseFloat(document.getElementById('distance').value);
            var speed = parseFloat(document.getElementById('speed').value);
            var mapSpeed = parseFloat(document.getElementById('mapSpeed').value);
            var faction = parseFloat(document.getElementById('faction').value);
            var march = document.getElementById('march').checked ? 1.5 : 1;

            if (isNaN(distance) || isNaN(speed) || isNaN(mapSpeed)) {
                document.getElementById('arrivalTime').innerText = "Prosím, zadejte všechna čísla";
                return;
            }

            if (speed <= 0 || mapSpeed <= 0) {
                document.getElementById('arrivalTime').innerText = "Chyba: rychlost musí být větší než 0";
                return;
            }

            var timeInSeconds = distance * 3600 / (speed * faction * march * mapSpeed);

            var hours = Math.floor(timeInSeconds / 3600);
            var minutes = Math.floor((timeInSeconds % 3600) / 60);
            var seconds = Math.floor(timeInSeconds % 60);

            var formattedTime = addLeadingZero(hours) + ":" + addLeadingZero(minutes) + ":" + addLeadingZero(seconds);

            document.getElementById('arrivalTime').innerText = "Příjezd za " + formattedTime;
        }
    </script>

</body>
